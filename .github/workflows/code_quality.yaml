name: Code Quality

on: pull_request

permissions:
  contents: read

jobs:
  golangci_lint:
    name: Golangci-lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Golangci-lint
        uses: golangci/golangci-lint-action@v9
